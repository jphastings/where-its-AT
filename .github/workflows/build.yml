name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  chromium-firefox:
    name: Build Chrome & Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm zip

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chrome
          path: dist/chrome.zip

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firefox
          path: dist/firefox.zip

  safari:
    name: Build Safari extension
    runs-on: macos-14
    needs: chromium-firefox
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:chrome

      - name: Convert to Safari Web Extension Xcode project
        run: |
          mkdir -p safari-build
          xcrun safari-web-extension-converter \
            dist/chrome \
            --project-location safari-build \
            --app-name "where it's at" \
            --bundle-identifier me.byjp.where-its-at \
            --swift \
            --no-prompt \
            --no-open \
            --force

      - name: Build Safari Xcode project (unsigned)
        run: |
          PROJECT_DIR=$(find safari-build -maxdepth 2 -name "*.xcodeproj" -type d | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "Could not locate generated Xcode project under safari-build/"
            ls -R safari-build
            exit 1
          fi
          SCHEMES_JSON=$(xcodebuild -list -project "$PROJECT_DIR" -json)
          SCHEME=$(echo "$SCHEMES_JSON" | jq -r '.project.schemes[] | select(test("macOS"; "i"))' | head -n 1)
          if [ -z "$SCHEME" ]; then
            SCHEME=$(echo "$SCHEMES_JSON" | jq -r '.project.schemes[0]')
          fi
          if [ -z "$SCHEME" ] || [ "$SCHEME" = "null" ]; then
            echo "Could not determine an Xcode scheme to build"
            echo "$SCHEMES_JSON"
            exit 1
          fi
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -project "$PROJECT_DIR" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath safari-build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safari-xcode-project
          path: safari-build
